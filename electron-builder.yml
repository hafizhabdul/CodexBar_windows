appId: com.codexbar.windows
productName: CodexBar
directories:
  buildResources: build
  output: release
files:
  - dist-electron
  - dist
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
